<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQL4-WEB API Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            color: #4ecca3;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #4ecca3;
        }

        .status-dot.disconnected {
            background: #e74c3c;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            font-size: 1.2rem;
            color: #4ecca3;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            color: #888;
        }

        .data-value {
            font-weight: 600;
            color: #fff;
        }

        .data-value.positive {
            color: #4ecca3;
        }

        .data-value.negative {
            color: #e74c3c;
        }

        .command-section {
            margin-top: 30px;
        }

        .command-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .command-form select,
        .command-form input {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
        }

        .command-form input {
            flex: 1;
        }

        .command-form button {
            padding: 12px 24px;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .command-form button:hover {
            background: #3db892;
            transform: translateY(-2px);
        }

        .log-section {
            margin-top: 30px;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry .time {
            color: #666;
            margin-right: 10px;
        }

        .log-entry.success {
            color: #4ecca3;
        }

        .log-entry.error {
            color: #e74c3c;
        }

        .log-entry.info {
            color: #3498db;
        }

        .price-big {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            padding: 20px 0;
        }

        .price-big .bid {
            color: #4ecca3;
        }

        .price-big .ask {
            color: #e74c3c;
        }

        .spread-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 MQL4-WEB API Dashboard</h1>
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot" id="connectionStatus"></span>
                    <span id="connectionText">Checking...</span>
                </div>
                <div class="status-item">
                    <span>⏱️ Last update: <span id="lastUpdate">--</span></span>
                </div>
                <div class="status-item">
                    <span>📤 Pending: <span id="pendingCommands">0</span></span>
                </div>
            </div>
        </header>

        <div class="grid">
            <!-- Price Card -->
            <div class="card">
                <h2>📈 Market Data</h2>
                <div class="price-big">
                    <span class="bid" id="bidPrice">--</span> / <span class="ask" id="askPrice">--</span>
                </div>
                <div style="text-align: center;">
                    <span class="spread-badge">Spread: <span id="spreadValue">--</span></span>
                </div>
                <div class="data-row">
                    <span class="data-label">Symbol</span>
                    <span class="data-value" id="symbolValue">--</span>
                </div>
            </div>

            <!-- Account Card -->
            <div class="card">
                <h2>💰 Account</h2>
                <div class="data-row">
                    <span class="data-label">Balance</span>
                    <span class="data-value" id="balanceValue">--</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Equity</span>
                    <span class="data-value" id="equityValue">--</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Profit</span>
                    <span class="data-value" id="profitValue">--</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Margin</span>
                    <span class="data-value" id="marginValue">--</span>
                </div>
            </div>
        </div>

        <!-- Command Section -->
        <div class="command-section card">
            <h2>📤 Send Command to MT4</h2>
            <div class="command-form">
                <select id="commandType">
                    <option value="alert">Alert</option>
                    <option value="log">Log</option>
                </select>
                <input type="text" id="commandMessage" placeholder="Enter message...">
                <button onclick="sendCommand()">Send</button>
            </div>
        </div>

        <!-- Log Section -->
        <div class="log-section card">
            <h2>📋 Activity Log</h2>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let pollInterval;

        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="time">[${time}]</span> ${message}`;
            container.insertBefore(entry, container.firstChild);

            // Keep only last 50 entries
            while (container.children.length > 50) {
                container.removeChild(container.lastChild);
            }
        }

        async function fetchData() {
            try {
                const response = await fetch(`${API_URL}/data`);
                const data = await response.json();

                updateUI(data);
                updateConnectionStatus(true);
            } catch (error) {
                updateConnectionStatus(false);
                log('Failed to fetch data', 'error');
            }
        }

        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();

                document.getElementById('pendingCommands').textContent = data.pending_commands || 0;
            } catch (error) {
                console.error('Health check failed');
            }
        }

        function updateUI(data) {
            // Connection
            const statusDot = document.getElementById('connectionStatus');
            statusDot.className = `status-dot ${data.connected ? 'connected' : 'disconnected'}`;
            document.getElementById('connectionText').textContent = data.connected ? 'MT4 Connected' : 'MT4 Disconnected';

            // Market data
            if (data.bid) document.getElementById('bidPrice').textContent = data.bid;
            if (data.ask) document.getElementById('askPrice').textContent = data.ask;
            if (data.spread !== null) document.getElementById('spreadValue').textContent = data.spread;
            if (data.symbol) document.getElementById('symbolValue').textContent = data.symbol;

            // Account data
            if (data.balance) document.getElementById('balanceValue').textContent = `$${data.balance}`;
            if (data.equity) document.getElementById('equityValue').textContent = `$${data.equity}`;

            if (data.profit) {
                const profitEl = document.getElementById('profitValue');
                profitEl.textContent = `$${data.profit}`;
                profitEl.className = `data-value ${parseFloat(data.profit) >= 0 ? 'positive' : 'negative'}`;
            }

            if (data.margin) document.getElementById('marginValue').textContent = `$${data.margin}`;

            // Last update
            if (data.lastUpdate) {
                const date = new Date(data.lastUpdate);
                document.getElementById('lastUpdate').textContent = date.toLocaleTimeString();
            }
        }

        function updateConnectionStatus(connected) {
            const statusDot = document.getElementById('connectionStatus');
            statusDot.className = `status-dot ${connected ? 'connected' : 'disconnected'}`;
        }

        async function sendCommand() {
            const type = document.getElementById('commandType').value;
            const message = document.getElementById('commandMessage').value;

            if (!message) {
                log('Please enter a message', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/command`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ type, message })
                });

                const result = await response.json();

                if (result.success) {
                    log(`Command "${type}" queued: ${message}`, 'success');
                    document.getElementById('commandMessage').value = '';
                } else {
                    log(`Failed to queue command: ${result.error}`, 'error');
                }
            } catch (error) {
                log('Failed to send command', 'error');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            log('Dashboard initialized', 'info');

            // Start polling
            fetchData();
            pollInterval = setInterval(() => {
                fetchData();
                checkHealth();
            }, 2000);
        });

        // Handle Enter key in message input
        document.getElementById('commandMessage').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendCommand();
            }
        });
    </script>
</body>
</html>
