# MQL4-WEB Docker Compose Configuration
# For Coolify deployment with API Polling mode
# Domain: mqweb.holancloud.com

services:
  mql4-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mql4-web-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SERVER_MODE=api
      - HTTP_PORT=3030
    networks:
      - coolify
    expose:
      - "3030"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3030/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    labels:
      - "coolify.managed=true"
      - "coolify.version=1"
      - "traefik.enable=true"
      - "traefik.http.routers.mql4-web.rule=Host(`mqweb.holancloud.com`)"
      - "traefik.http.routers.mql4-web.entrypoints=https"
      - "traefik.http.routers.mql4-web.tls=true"
      - "traefik.http.routers.mql4-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.mql4-web.loadbalancer.server.port=3030"
      - "traefik.http.services.mql4-web.loadbalancer.server.scheme=http"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  coolify:
    external: true
