# MQL4-WEB Docker Compose Configuration
# For Coolify deployment with API Polling mode

services:
  mql4-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mql4-web-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SERVER_MODE=api
      - HTTP_PORT=3030
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3030/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
